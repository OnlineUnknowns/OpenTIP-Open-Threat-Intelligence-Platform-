version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: tip_postgres
    restart: always
    environment:
      POSTGRES_DB: threat_intel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d threat_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tip_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: tip_api
    restart: always
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=threat_intel
      - REDIS_HOST=redis
      - VIRUSTOTAL_API_KEY=mock_vt_key
      - SHODAN_API_KEY=mock_shodan_key
      - DECAY_LAMBDA=0.05
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
    container_name: tip_celery_worker
    restart: always
    command: celery -A workers.celery_app.celery_app worker --loglevel=info
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=threat_intel
      - REDIS_HOST=redis
      - VIRUSTOTAL_API_KEY=mock_vt_key
      - SHODAN_API_KEY=mock_shodan_key
      - DECAY_LAMBDA=0.05
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
